encoding: UTF-8

url: "https://tzling.com"
title: Tzling
description: 產品、職涯、編織、語言、與一直在搬家的生活
description_en: Product, career, knitting, language, and a life that keeps moving.
lang: zh_TW

theme: null

kramdown:
  auto_ids: true

permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-seo-tag
  - jekyll-redirect-from

exclude:
  - .git
  - .gitignore
  - package.json
  - package-lock.json
  - yarn.lock
  - node_modules
  - CNAME
  - Gemfile
  - Gemfile.lock
  - README.md

defaults:
  - scope:
      path: "assets"
    values:
      image: true

future: true